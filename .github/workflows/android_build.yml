name: Build Android APK
on:
  workflow_dispatch: # Allows you to manually tap the button on your phone to run it

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Generate Fullscreen Android APK
      uses: ovaaa/angular-pwa-apk-build@v1.0.1
      with:
        # 🔗 Your core web portal link that the app will open directly into
        appUrl: 'https://priywrathimanshu.github.io/index.html'
        appName: 'DK Singh Classes'
        packageName: 'com.priywrat.examportal'
        # Employs a public generic layout icon so it builds instantly without erroring out
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/5351/5351478.png'

    - name: Upload Compiled APK File
      uses: actions/upload-artifact@v4
      with:
        name: DK-Singh-Classes-App
        path: ./*.apk
